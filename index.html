// Self-healing DB writes: track columns Supabase rejects and never send them again.
// On first bad-column error, the column is cached and the write retried automatically.
const REJECTED_COLS = {}; // { tableName: Set<colName> }

async function safeUpsert(table, record, opts = {}) {
  const bad = REJECTED_COLS[table] || new Set();
  const clean = Object.fromEntries(Object.entries(record).filter(([k]) => !bad.has(k)));
  const { data, error } = await sb.from(table).upsert(clean, opts);
  if (error) {
    const m = error.message.match(/Could not find the '([^']+)' column/);
    if (m) {
      if (!REJECTED_COLS[table]) REJECTED_COLS[table] = new Set();
      REJECTED_COLS[table].add(m[1]);
      console.warn(`[schema] dropping unknown col '${m[1]}' from ${table}`);
      return safeUpsert(table, record, opts); // retry without the bad column
    }
  }
  return { data, error };
}

async function safeInsert(table, record) {
  const bad = REJECTED_COLS[table] || new Set();
  const clean = Object.fromEntries(Object.entries(record).filter(([k]) => !bad.has(k)));
  const { data, error } = await sb.from(table).insert(clean);
  if (error) {
    const m = error.message.match(/Could not find the '([^']+)' column/);
    if (m) {
      if (!REJECTED_COLS[table]) REJECTED_COLS[table] = new Set();
      REJECTED_COLS[table].add(m[1]);
      console.warn(`[schema] dropping unknown col '${m[1]}' from ${table}`);
      return safeInsert(table, record);
    }
  }
  return { data, error };
}

function enrichPatientData(data){
  const name = data.full_name || data.name || 'Patient';
  return {
    ...data,
    name,
    avatar: data.avatar || initials(name),
    avatarColor: data.avatarColor || avColor(0),
    conditions: data.conditions || [],
    medications: currentMedications.length > 0
      ? currentMedications.map((m,i)=>{
          const prescribedTimes = (m.times||['Morning']).map(t=>t.toLowerCase());
          const medId = m.medication_id||i;
          const todayLogs = currentMedicationLogs.filter(l=>l.medication_id===medId);
          const logStatus = slot => {
            const l = todayLogs.find(l=>l.scheduled_time===slot);
            return l ? l.status : (prescribedTimes.includes(slot) ? 'pending' : 'na');
          };
          return {
            id: medId, name: m.medication_name||m.name,
            generic: m.generic_name||'', freq: m.frequency||'OD',
            times: m.times||['Morning'],
            bg: ['#E8F5F2','#EFF6FF','#EDE9FE','#FEE2E2'][i%4],
            color: ['#22C55E','#2563EB','#7C3AED','#EF4444'][i%4],
            logs:{
              morning: logStatus('morning'),
              afternoon: logStatus('afternoon'),
              evening: logStatus('evening'),
              night: logStatus('night'),
            }
          };
        })
      : [],
    adherenceWeek: data.adherenceWeek||[70,80,65,90,75,80,85],
    recentCheckins: currentCheckins.length>0
      ? currentCheckins.map(c=>({date:c.checkin_date,feeling:c.feeling_score||c.feeling||3,pain:c.pain_level||c.pain||3,symptoms:c.symptoms||[],note:c.notes||c.note||c.patient_notes||c.message||c.description||'',flag:(((c.feeling_score||c.feeling)||3)<=2||(c.symptoms||[]).some(s=>['Chest pain','Breathlessness'].includes(s)))||false}))
      : [],
    age: data.age||'', city: data.city||'',
    hospital: data.hospital_name||data.hospitalName||data.hospital||'',
    adherenceToday: 78,
    followupDate: data.followup_date||'TBD',
    lastCheckin: data.last_checkin_date||data.lastCheckin||'',
    dischargeDate: data.discharge_date||new Date().toISOString(),
    photo: data.photo||null,
    doctor: data.doctor||null,
  };
}

async function loadPatientData(patientId){
  const id = patientId || currentPatientId;
  if(!id){ PATIENT_DATA = null; return null; }
  if(PATIENT_DATA?.patient_id === id) return PATIENT_DATA;
  try{
    const { data, error } = await sb.from('patients').select('*').eq('patient_id', id).maybeSingle();
    if(error || !data) throw error || new Error('No patient');
    PATIENT_DATA = enrichPatientData(data);
    currentPatientData = PATIENT_DATA;
  } catch(err){
    console.warn('loadPatientData error', err);
    PATIENT_DATA = null;
  }
  return PATIENT_DATA;
}

async function loadPractitionerPatients(){
  if(PATIENT_LIST) return PATIENT_LIST;
  if(!currentUser?.user_id) return [];
  const { data, error } = await sb.from('patients').select('*').eq('created_by', currentUser.user_id);
  if(error){ console.warn('loadPractitionerPatients error', error); return []; }

  const patientIds = (data||[]).map(p=>p.patient_id).filter(Boolean);
  const today = new Date().toISOString().split('T')[0];
  const weekAgo = new Date(Date.now()-7*864e5).toISOString().split('T')[0];

  // Load real check-in and medication log data for all patients in parallel
  const [checkinRes, logRes] = patientIds.length
    ? await Promise.all([
        sb.from('daily_checkins').select('*').in('patient_id',patientIds)
          .gte('checkin_date',weekAgo).order('checkin_date',{ascending:false}),
        sb.from('medication_logs').select('*').in('patient_id',patientIds)
          .eq('log_date',today)
      ])
    : [{data:[]},{data:[]}];

  const allCheckins = checkinRes.data||[];
  const allLogs = logRes.data||[];

  PATIENT_LIST = (data||[]).map((pt,i)=>{
    const ptCheckins = allCheckins.filter(c=>c.patient_id===pt.patient_id);
    const latestCheckin = ptCheckins[0]||null;
    const ptLogs = allLogs.filter(l=>l.patient_id===pt.patient_id);
    const confirmedLogs = ptLogs.filter(l=>l.status==='confirmed').length;
    const missedLogs = ptLogs.filter(l=>l.status==='missed').length;
    const totalLogs = ptLogs.length;
    const adherence = totalLogs>0 ? Math.round(confirmedLogs/totalLogs*100) : null;
    return {
      ...pt,
      id: pt.patient_id,
      name: pt.full_name||pt.name||'Unknown',
      status: pt.status||'green',
      avatar: initials(pt.full_name||pt.name||'UN'),
      conditions: pt.conditions||[],
      daysSince: pt.discharge_date
        ? Math.floor((Date.now()-new Date(pt.discharge_date).getTime())/(1000*60*60*24))
        : 0,
      lastCheckin: latestCheckin?.checkin_date || pt.last_checkin_date || 'No check-in yet',
      condition: (pt.conditions||[]).join(' · '),
      latestCheckin,
      adherence,
      confirmedLogs,
      missedLogs,
      totalLogs,
    };
  });
  return PATIENT_LIST;
}

async function handleAddPatient(){
  // Collect current input values (may be on step 2)
  const storedName = document.querySelector('[data-field="patName"]')?.value?.trim() ||
    document.getElementById('newPatName')?.value?.trim();
  const storedEmail = document.querySelector('[data-field="patEmail"]')?.value?.trim().toLowerCase() ||
    document.getElementById('newPatEmail')?.value?.trim().toLowerCase();
  // Read prescription names from visible inputs
  document.querySelectorAll('.rx-name-inp').forEach((inp,i)=>{
    if(S.newPrescriptions[i]) S.newPrescriptions[i].name = inp.value.trim();
  });
  const name = S._pendingPatName || storedName;
  const email = S._pendingPatEmail || storedEmail;
  const familyEmail = (S._pendingFamilyEmail || '').trim().toLowerCase();
  const condition = S._pendingCondition || '';
  const prescriptions = (S.newPrescriptions||[]).filter(rx=>rx.name?.trim());

  if(!name || !email || !email.includes('@') || !email.includes('.')){
    alert('Please enter a valid name and email address.'); return;
  }
  if(!currentUser?.user_id){ alert('Session expired.'); return; }
  const btn = document.getElementById('addPatBtn');
  if(btn){ btn.textContent='Saving...'; btn.disabled=true; }

  const { data: existingPat } = await sb.from('patients')
    .select('patient_id').eq('email', email).eq('created_by', currentUser.user_id).maybeSingle();
  if(existingPat){
    alert(`A patient with email ${email} already exists.`);
    if(btn){ btn.textContent='Save Patient & Activate'; btn.disabled=false; }
    return;
  }

  const newPatientId = crypto.randomUUID();
  const conditions = condition ? condition.split(',').map(s=>s.trim()).filter(Boolean) : [];
  const { error: pe } = await sb.from('patients').insert({
    patient_id: newPatientId, full_name: name, email, created_by: currentUser.user_id,
    conditions, discharge_date: new Date().toISOString().split('T')[0],
  });
  if(pe){ alert('Error: '+pe.message); if(btn){ btn.textContent='Save Patient & Activate'; btn.disabled=false; } return; }

  const { data: existingUser } = await sb.from('users').select('user_id').eq('email',email).eq('role','patient').maybeSingle();
  if(existingUser){
    await sb.from('users').update({linked_patient_id:newPatientId,full_name:name}).eq('user_id',existingUser.user_id);
  } else {
    const { error: ue } = await sb.from('users').insert({
      user_id: crypto.randomUUID(), email, full_name: name, role:'patient',
      linked_patient_id: newPatientId, is_verified:false, is_active:true
    });
    if(ue) console.warn('User insert:', ue.message);
  }

  // Create family user if email provided
  if(familyEmail && familyEmail.includes('@')){
    const familyUserId = crypto.randomUUID();
    const { data: ef } = await sb.from('users').select('user_id').eq('email',familyEmail).eq('role','family').maybeSingle();
    if(!ef){
      await sb.from('users').insert({
        user_id: familyUserId, email: familyEmail, full_name:'Family Member', role:'family',
        linked_patient_id: newPatientId, is_verified:false, is_active:true
      }).catch(()=>{});
      await sb.from('patient_family_links').insert({
        patient_id: newPatientId, family_user_id: familyUserId, relationship:'family', is_primary_contact:true
      }).catch(()=>{});
    }
  }

  // Save prescriptions
  const rxErrors = [];
  for(const rx of prescriptions){
    const times = (rx.times||[]).map(t=>t.charAt(0).toUpperCase()+t.slice(1));
    const freq = times.length>=3?'TDS':times.length===2?'BD':'OD';
    const { error: rxErr } = await sb.from('medications').insert({
      medication_id: crypto.randomUUID(), patient_id: newPatientId,
      medication_name: rx.name, frequency: freq, times, is_active: true
    });
    if(rxErr) rxErrors.push(`${rx.name}: ${rxErr.message}`);
  }
  if(rxErrors.length) console.warn('Prescription save errors:', rxErrors);

  PATIENT_LIST = null;
  await loadPractitionerPatients();
  S.showAddPatientModal = false; S.addPatientStep = 0; S.newPrescriptions = [];
  S._pendingPatName=''; S._pendingPatEmail=''; S._pendingFamilyEmail=''; S._pendingCondition='';
  const rxMsg = rxErrors.length
    ? `\n⚠️ ${rxErrors.length} prescription(s) failed to save:\n${rxErrors.join('\n')}`
    : prescriptions.length ? `\n${prescriptions.length} prescription(s) saved.` : '';
  alert(`✅ Patient "${name}" added!${rxMsg}\nThey can log in with ${email}.`);
  render();
}

  if(!confirm(`Delete patient "${name}"?\n\nThis removes their profile and all associated data. This cannot be undone.`)) return;
  await sb.from('users').delete().eq('linked_patient_id', patientId);
  const { error } = await sb.from('patients').delete().eq('patient_id', patientId);
  if(error){ alert('Error: '+error.message); return; }
  if(currentPatientId === patientId){ currentPatientId=null; PATIENT_DATA=null; currentPatientData=null; }
  PATIENT_LIST = null;
  await loadPractitionerPatients();
  render();
}

function t(key, ...args){
  const template = LANG[S.language]?.[key] ?? LANG.en[key] ?? key;
  return args.length ? template.replace(/\{(\d+)\}/g,(_,i)=>args[i] ?? '') : template;
}

function languageName(code){
  return LANG_LABELS[code] || code;
}

function setLanguage(code){
  if(LANG[code]){
    S.language = code;
    render();
  }
}

async function handlePhotoUpload(input){
  const file = input?.files?.[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    const p = await loadPatientData();
    if(!p) return;
    p.photo = reader.result;
    await updatePatientRecord({ photo: p.photo });
    render();
  };
  reader.readAsDataURL(file);
}

async function saveProfileChanges(){
  const p = await loadPatientData();
  if(!p) return;
  const name = document.getElementById('profileName')?.value.trim() || p.name;
  const age = document.getElementById('profileAge')?.value.trim() || p.age;
  const city = document.getElementById('profileCity')?.value.trim() || p.city;
  const conditions = document.getElementById('profileConditions')?.value || (p.conditions||[]).join(', ');
  const hospital = document.getElementById('profileHospital')?.value.trim() || p.hospitalName || p.hospital || '';

  const reminderInputs = document.querySelectorAll('.reminderTimeInput');
  const reminderTimes = Array.from(reminderInputs)
    .map(input => input.value).filter(time => time.trim() !== '').sort();

  const updates = {
    full_name: name,
    age,
    city,
    hospital_name: hospital,
  };

  await updatePatientRecord(updates);
  S.reminderTimes = reminderTimes;
  S.reminderTime = reminderTimes.length > 0 ? reminderTimes[0] : '';
  if(reminderTimes.length > 0) scheduleReminders();
  alert(t('profile_saved'));
  nav('modules');
}

function addReminderTime(){
  // Add new empty reminder time and re-render
  S.reminderTimes.push('');
  render();
  // Focus the new input
  setTimeout(() => {
    const inputs = document.querySelectorAll('.reminderTimeInput');
    if(inputs.length > 0) inputs[inputs.length - 1].focus();
  }, 50);
}

function removeReminderTime(idx){
  S.reminderTimes.splice(idx, 1);
  render();
}

function editReminders(){
  nav('profile', null, true);
}

async function callDoctor(){
  const p = await loadPatientData();
  const tel = (p?.doctor?.phone || '').replace(/\s+/g,'');
  if(!tel) return alert('Doctor contact not available');
  window.location.href = 'tel:' + tel;
}

function scheduleReminders(){
  // Clear existing reminders
  if(S.reminderTimeouts){
    S.reminderTimeouts.forEach(timeout => clearTimeout(timeout));
  }
  S.reminderTimeouts = [];
  
  if(!S.reminderTimes || S.reminderTimes.length === 0) return;
  
  S.reminderTimes.forEach((time, idx) => {
    const [hours, mins] = time.split(':').map(Number);
    const now = new Date();
    const target = new Date(now);
    target.setHours(hours, mins, 0, 0);
    if(target <= now) target.setDate(target.getDate() + 1);
    const delay = target - now;
    
    const timeout = setTimeout(()=>{
      alert(`${t('reminder_alert', time)}`);
    }, delay);
    S.reminderTimeouts.push(timeout);
  });
}

function scheduleReminder(){
  // Backward compatibility - calls scheduleReminders
  scheduleReminders();
}

function nav(screen, sub=null, push=true){
  if(push) S.navHistory.push({screen:S.screen, sub:S.subScreen});
  S.screen=screen; S.subScreen=sub;
  render();
  setTimeout(() => { document.getElementById('app').scrollTop=0; }, 0);
}
function back(){
  const prev=S.navHistory.pop();
  if(prev){ S.screen=prev.screen; S.subScreen=prev.sub; render(); }
}

const AVATAR_COLORS = ['#FFD700','#5BC0EB','#8D6E63','#57A773','#F28A8C','#B39DDB'];
function avColor(i){ return AVATAR_COLORS[i % AVATAR_COLORS.length]; }
function initials(n){ return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function feelEmoji(f){ return ['','😞','😕','😐','🙂','😊'][f]||'😐'; }

function svgCircle(pct, r=44, stroke=8, color='#0B7A63'){
  const c=2*Math.PI*r, dash=c*(pct/100);
  return `<svg width="${r*2+stroke*2}" height="${r*2+stroke*2}" viewBox="0 0 ${r*2+stroke*2} ${r*2+stroke*2}">
    <circle cx="${r+stroke}" cy="${r+stroke}" r="${r}" fill="none" stroke="#E5E9F0" stroke-width="${stroke}"/>
    <circle cx="${r+stroke}" cy="${r+stroke}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${c}" stroke-dashoffset="0" stroke-linecap="round"/>
  </svg>`;
}

function weekBars(){
  const days=['M','T','W','T','F','S','S'];
  const data = PATIENT_DATA?.adherenceWeek || [];
  const max=100;
  return days.map((d,i)=>{
    const h=Math.round((data[i]/max)*52), today=i===6;
    return `<div class="week-bar-wrap">
      <div class="week-bar" style="height:${h}px;background:${today?'var(--primary)':'var(--primary-100)'};opacity:${today?1:.7}"></div>
      <div class="week-day" style="color:${today?'var(--primary)':'var(--text3)'};font-weight:${today?700:600}">${d}</div>
    </div>`;
  }).join('');
}

function sparkLine(){
  const vals=[58,72,60,40,75,78,82];
  const w=280, h=48, pad=4;
  const minV=Math.min(...vals)-5, maxV=Math.max(...vals)+5;
  const pts=vals.map((v,i)=>`${pad+i*(w-2*pad)/6},${h-pad-(v-minV)/(maxV-minV)*(h-2*pad)}`).join(' ');
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="spg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B7A63" stop-opacity=".25"/><stop offset="100%" stop-color="#0B7A63" stop-opacity="0"/>
    </linearGradient></defs>
    <polyline fill="none" stroke="#0B7A63" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" points="${pts}"/>
    <polygon fill="url(#spg)" points="${pad},${h} ${pts} ${pad+(vals.length-1)*(w-2*pad)/6},${h}"/>
  </svg>`;
}

function doseDot(status){
  if(status==='na') return `<div class="dose-dot na">—</div>`;
  if(status==='confirmed') return `<div class="dose-dot confirmed">${I.check}</div>`;
  if(status==='missed') return `<div class="dose-dot missed">${I.x}</div>`;
  return `<div class="dose-dot pending">•</div>`;
}

const TRIAGE = {

function detectFlow(text){
  const t=text.toLowerCase();
  for(const [k,v] of Object.entries(TRIAGE)){
    if(k!=='default' && v.kw.some(kw=>t.includes(kw))) return k;
  }
  return 'default';
}

function triageRespond(userText){
  if(S.triageState==='idle'){
    S.triageFlow=detectFlow(userText);
    S.triageStep=0;
    const flow=TRIAGE[S.triageFlow];
    // emergency goes straight to result after 1 question
    if(S.triageFlow==='chest'){
      addBotMsg(flow.qs[0], ()=>{S.triageState='questioning'; S.triageStep=1;});
    } else {
      S.triageState='questioning';
      addBotMsg(flow.qs[0]);
    }
  } else if(S.triageState==='questioning'){
    const flow=TRIAGE[S.triageFlow];
    S.triageStep++;
    if(S.triageFlow==='chest' || S.triageStep>=flow.qs.length){
      // show result
      S.triageState='done';
      showTriageResult();
    } else {
      addBotMsg(flow.qs[S.triageStep]);
    }
  }
}

function addBotMsg(text, cb=null){
  // show typing first
  S.cgMessages.push({type:'typing'});
  render();
  scrollChat();
  setTimeout(()=>{
    S.cgMessages=S.cgMessages.filter(m=>m.type!=='typing');
    S.cgMessages.push({type:'bot', text});
    if(cb) cb();
    render();
    scrollChat();
  },1200);
}

function showTriageResult(){
  S.cgMessages.push({type:'typing'});
  render(); scrollChat();
  setTimeout(()=>{
    S.cgMessages=S.cgMessages.filter(m=>m.type!=='typing');
    S.cgMessages.push({type:'result', flow:S.triageFlow});
    render(); scrollChat();
  },1500);
}

function scrollChat(){
  setTimeout(()=>{
    const ca=document.querySelector('.chat-area');
    if(ca) ca.scrollTop=ca.scrollHeight;
  },50);
}

async function handleOTPVerify() {
  const token = document.getElementById('otpInput')?.value?.trim();
  if (!token || token.length < 6) {
    alert('Please enter the complete 6-digit code.');
    return;
  }

  const btn = document.getElementById('verifyBtn');
  if (btn) { btn.textContent = 'Verifying...'; btn.disabled = true; }

  const { data, error } = await sb.auth.verifyOtp({
    email: S.email,
    token,
    type: 'email'
  });

  if (error) {
    console.error('OTP verify error:', error);
    alert('Incorrect or expired OTP. Please request a new one.');
    if (btn) { btn.textContent = 'Verify & Continue'; btn.disabled = false; }
    return;
  }

  const authUser = data?.user || data?.session?.user;
  if (!authUser?.email) {
    console.error('OTP verify returned no user:', data);
    alert('Unable to verify your login. Please try again.');
    if (btn) { btn.textContent = 'Verify & Continue'; btn.disabled = false; }
    return;
  }

  await detectRolesAndRoute(authUser);
}

async function getRolesForEmail(email) {
  if (!email) return [];

  const { data, error } = await sb.rpc('get_roles_for_email', { p_email: email });
  if (!error && Array.isArray(data)) {
    return data;
  }

  console.warn('get_roles_for_email RPC failed, falling back to users query:', error);

  const { data: users, error: usersError } = await sb
    .from('users')
    .select('user_id, email, role, full_name')
    .eq('email', email);

  if (usersError) {
    console.error('Fallback getRolesForEmail query failed:', usersError);
    return [];
  }

  const roles = await Promise.all((users || []).map(async u => {
    if (u.role === 'patient') {
      const { data: patient } = await sb
        .from('patients')
        .select('patient_id')
        .eq('email', u.email)
        .maybeSingle();
      return { ...u, linked_patient_id: patient?.patient_id || null };
    }
    if (u.role === 'family') {
      const { data: link } = await sb
        .from('patient_family_links')
        .select('patient_id')
        .eq('family_user_id', u.user_id)
        .maybeSingle();
      return { ...u, linked_patient_id: link?.patient_id || null };
    }
    return u;
  }));

  return roles;
}

async function detectRolesAndRoute(authUser) {
  S.email = authUser.email;
  const roles = await getRolesForEmail(authUser.email);

  if (!roles || roles.length === 0) {
    if (S.userTypeHint === 'clinical') {
      await registerNewDoctor(authUser);
    } else {
      // Check if doctor has already added this email to patients table
      const { data: patient } = await sb
        .from('patients').select('patient_id').eq('email', authUser.email).maybeSingle();
      if (patient?.patient_id) {
        // Auto-create user record and log them in as patient
        await sb.from('users').insert({
          user_id: authUser.id || crypto.randomUUID(),
          email: authUser.email,
          full_name: authUser.email.split('@')[0],
          role: 'patient',
          linked_patient_id: patient.patient_id,
          is_verified: true,
          is_active: true
        });
        const roles2 = await getRolesForEmail(authUser.email);
        if (roles2?.length > 0) { await applyRole(roles2[0]); return; }
      }
      // No profile found — let them in with a nudge banner
      currentUser = { email: authUser.email, role: 'patient', user_id: authUser.id };
      S.role = 'patient';
      S.noProfileNudge = true;
      currentPatientId = null;
      currentPatientData = null;
      PATIENT_DATA = null;
      nav('modules');
    }
    return;
  }

  if (roles.length === 1) {
    await applyRole(roles[0]);
  } else {
    availableRoles = roles;
    nav('roleSelect');
  }
}

async function registerNewDoctor(authUser) {
  const email = authUser.email;
  const userId = authUser.id || crypto.randomUUID();
  const name = email.split('@')[0]
    .replace(/[._]/g, ' ')
    .replace(/\b\w/g, l => l.toUpperCase());

  const { data: existing } = await sb
    .from('users').select('user_id').eq('email', email).maybeSingle();

  if (existing) {
    const roles = await getRolesForEmail(email);
    if (roles && roles.length > 0) await applyRole(roles[0]);
    return;
  }

  let { error } = await sb.from('users').insert({
    user_id: userId,
    email,
    full_name: 'Dr. ' + name,
    role: 'doctor',
    is_verified: true,
    is_active: true
  });

  if (error) {
    // Fallback with fresh UUID if auth ID conflicts with DB constraint
    const { error: e2 } = await sb.from('users').insert({
      user_id: crypto.randomUUID(),
      email,
      full_name: 'Dr. ' + name,
      role: 'doctor',
      is_verified: true,
      is_active: true
    });
    if (e2) { alert('Could not create doctor profile: ' + e2.message); return; }
  }

  const roles = await getRolesForEmail(email);
  if (roles && roles.length > 0) await applyRole(roles[0]);
}

async function applyRole(roleRow) {
  currentUser = roleRow;
  S.role = roleRow.role;
  S.noProfileNudge = false;
  PATIENT_DATA = null;
  PATIENT_LIST = null;
  PRACTITIONER_DATA = null;
  FAMILY_DATA = null;

  if (roleRow.role === 'patient') {
    currentPatientId = roleRow.linked_patient_id || null;
    if (!currentPatientId && roleRow.email) {
      const { data: patient } = await sb
        .from('patients').select('patient_id').eq('email', roleRow.email).maybeSingle();
      currentPatientId = patient?.patient_id || null;
    }
    if (!currentPatientId) S.noProfileNudge = true;
  } else if (roleRow.role === 'family') {
    const { data: link } = await sb
      .from('patient_family_links').select('patient_id').eq('family_user_id', roleRow.user_id).maybeSingle();
    currentPatientId = link?.patient_id || null;
    if (!currentPatientId && roleRow.email) {
      // Also check if patient was linked by email in patients table
      const { data: pt } = await sb.from('patients').select('patient_id').eq('family_email', roleRow.email).maybeSingle();
      currentPatientId = pt?.patient_id || null;
    }
    if (!currentPatientId) S.noProfileNudge = true;
  } else if (roleRow.role === 'doctor' || roleRow.role === 'nurse') {
    currentPatientId = null;
  }

  if (currentPatientId) {
    await loadAllPatientData();
  }

  nav('modules');
}

async function loadAllPatientData() {
  if (!currentPatientId) return;

  const today = new Date().toISOString().split('T')[0];

  const [patientRes, medRes, logRes, checkinRes] = await Promise.all([
    sb.from('patients').select('*').eq('patient_id', currentPatientId).maybeSingle(),
    sb.from('medications').select('*').eq('patient_id', currentPatientId).eq('is_active', true),
    sb.from('medication_logs').select('*').eq('patient_id', currentPatientId)
      .eq('log_date', today)
      .then(r => r).catch(() => ({data: [], error: null})),
    sb.from('daily_checkins').select('*').eq('patient_id', currentPatientId)
      .order('checkin_date', { ascending: false }).limit(7)
      .then(r => r).catch(() => ({data: [], error: null})),
  ]);

  currentMedications = medRes.data || [];
  currentMedicationLogs = logRes.data || [];
  currentCheckins = checkinRes.data || [];
  currentPatientData = patientRes.data || null;
  PATIENT_DATA = currentPatientData ? enrichPatientData(currentPatientData) : null;
}

async function renderCarePathNurse(){
  if(S.subScreen==='discharge') return renderDischargeForm();
  if(S.subScreen==='patientDetail') return await renderPatientDetail();

  PATIENT_LIST = null;
  const practitioner = await loadPractitionerData();
  const patients = await loadPractitionerPatients();
  const red = patients.filter(x=>x.status==='red').length;
  const amber = patients.filter(x=>x.status==='amber').length;
  const green = patients.filter(x=>x.status==='green'||!x.status).length;
  const title = practitioner?.name || currentUser?.full_name || (S.role==='nurse'?'Nurse':'Doctor');

  // Sort: red first, amber next, green last
  const sorted = [...patients].sort((a,b)=>{
    const order={red:0,amber:1,green:2};
    return (order[a.status]??2)-(order[b.status]??2);
  });

  function patCheckinSummary(pt){
    const ci = pt.latestCheckin;
    if(!ci) return {feeling:null,emoji:'❓',symptoms:[],label:'No check-in yet',flag:false};
    const feeling = ci.feeling_score||3;
    const isFlag = feeling<=2 || (ci.symptoms||[]).some(s=>['Chest pain','Breathlessness'].includes(s));
    const label = isFlag?'Needs attention — check immediately':feeling>=4?'Recovering well':feeling===3?'Monitor closely':'Check-in flagged';
    return {feeling, emoji:feelEmoji(feeling), symptoms:ci.symptoms||[], label, flag:isFlag};
  }

  return `<div class="screen" style="min-height:100vh">
    <div class="topbar">
      <button class="topbar-back" onclick="nav('modules')">${I.back}</button>
      <div class="topbar-title">CarePath — Post-Discharge</div>
      <div class="topbar-avatar" style="background:var(--blue)" title="${title}">${I.stethoscope.replace('stroke="currentColor"','stroke="white"').replace('width="20" height="20"','width="16" height="16"')}</div>
    </div>
    <div style="padding:8px 16px 4px">
      <div style="font-size:13px;color:var(--text2)">${title} · Post-Discharge Dashboard</div>
    </div>
    <div class="stat-row">
      <div class="stat-chip"><div class="stat-num">${patients.length}</div><div class="stat-label">Total</div></div>
      <div class="stat-chip red"><div class="stat-num">${red}</div><div class="stat-label">Critical</div></div>
      <div class="stat-chip amber"><div class="stat-num">${amber}</div><div class="stat-label">Monitor</div></div>
      <div class="stat-chip green"><div class="stat-num">${green}</div><div class="stat-label">Good</div></div>
    </div>
    ${red>0?`<div class="alert-banner red">${I.alert.replace('stroke="currentColor"','stroke="var(--danger)"')}
      <span><strong>⚠️ ${red} patient${red>1?'s':''} need${red===1?'s':''} urgent attention.</strong> Review critical check-ins below.</span></div>`:''}
    <div class="sec-header">
      <div class="sec-title">Active Patients (${patients.length})</div>
      <button class="sec-action" onclick="addPatientForPractitioner()">+ Add</button>
    </div>
    <div>
      ${patients.length===0?`<div class="empty-state"><div class="emoji">🏥</div><p>No patients added yet.<br>Tap "Add New Patient" to get started.</p></div>`:''}
      ${sorted.map((pt,i)=>{
        const ci = patCheckinSummary(pt);
        const isCritical = pt.status==='red';
        return `<div class="patient-row" style="${isCritical?'background:#FFF5F5;border-left:3px solid var(--danger);':''}" onclick="selectPatient('${pt.id}')">
          <div style="position:relative">
            <div class="pat-avatar" style="background:${avColor(i)}">${pt.avatar||initials(pt.name)}</div>
            ${isCritical?`<div style="position:absolute;top:-2px;right:-2px;width:12px;height:12px;background:var(--danger);border-radius:50%;border:2px solid #fff"></div>`:''}
          </div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px">
              <div class="pat-name">${pt.name}</div>
              ${isCritical?`<span class="badge red" style="font-size:10px">⚠️ Critical</span>`:''}
            </div>
            <div class="pat-sub">${pt.condition||'No conditions'} · Day ${pt.daysSince||0}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
              <span style="font-size:18px">${ci.emoji}</span>
              <span style="font-size:12px;color:${isCritical?'var(--danger)':'var(--text2)'};">${ci.label}</span>
            </div>
            ${ci.symptoms.length?`<div style="font-size:11px;color:var(--danger);margin-top:2px">Symptoms: ${ci.symptoms.join(', ')}</div>`:''}
            <div style="font-size:11px;color:var(--text3);margin-top:2px">Last check-in: ${pt.lastCheckin||'No check-in yet'}</div>
          </div>
          <div class="pat-status" style="align-items:flex-end">
            <span class="badge ${pt.status||'green'}" style="white-space:nowrap">${pt.status==='red'?'Needs Attention':pt.status==='amber'?'Monitor':'All Good'}</span>
            <div style="display:flex;gap:4px;margin-top:6px">
              <button class="icon-btn" style="padding:4px 8px;font-size:11px" onclick="event.stopPropagation();editPatient('${pt.id}','${pt.name}','${pt.email||''}')">Edit</button>
              <button class="icon-btn danger" style="padding:4px 8px;font-size:11px" onclick="event.stopPropagation();deletePatient('${pt.id}','${pt.name}')">✕</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <button class="float-btn" onclick="addPatientForPractitioner()">
      ${I.plus.replace('stroke="currentColor"','stroke="white"')} Add New Patient
    </button>
    ${renderAddPatientModal()}
  </div>`;
}

async function submitDischarge(){
  const patientName = document.querySelector(
    '#newPatientName, input[placeholder*="Ramabai"]')?.value?.trim();
  const patientEmail = document.querySelector(
    '#newPatientEmail, input[type="email"]')?.value?.trim().toLowerCase();
  const familyEmail = document.querySelector(
    '#familyEmail, input[placeholder*="son@"]')?.value?.trim().toLowerCase();

  if (!patientName || !patientEmail) {
    alert('Patient name and email are required.'); return;
  }

  const newPatientId = crypto.randomUUID();
  const patientUserId = crypto.randomUUID();
  const inviteCode = Math.random().toString(36)
    .substring(2, 8).toUpperCase();

  const { error: pe } = await sb.from('patients').insert({
    patient_id: newPatientId,
    full_name: patientName,
    email: patientEmail,
    created_by: currentUser?.user_id
  });
  if (pe) { alert('Error: ' + pe.message); return; }

  await sb.from('users').insert({
    user_id: patientUserId,
    email: patientEmail,
    full_name: patientName,
    role: 'patient',
    linked_patient_id: newPatientId,
    is_verified: false,
    is_active: true
  });

  await sb.from('discharge_records').insert({
    patient_id: newPatientId,
    discharged_by: currentUser?.user_id,
    discharge_date: new Date().toISOString().split('T')[0],
    checkin_protocol_days: 14
  });

  if (familyEmail) {
    const familyUserId = crypto.randomUUID();
    await sb.from('users').insert({
      user_id: familyUserId,
      email: familyEmail,
      full_name: 'Family Member',
      role: 'family',
      is_verified: false,
      is_active: true
    });
    await sb.from('patient_family_links').insert({
      patient_id: newPatientId,
      family_user_id: familyUserId,
      relationship: 'family',
      is_primary_contact: true,
      invite_code: inviteCode
    });
    alert('Patient registered.\n\n' +
      'Patient email: ' + patientEmail +
      '\nFamily email: ' + familyEmail +
      '\n\nBoth can now log in with their email and receive an OTP. ' +
      'If family shares patient email, they will see a role selector after login.');
  } else {
    alert('Patient registered.\n\nPatient email: ' + patientEmail +
      '\n\nThey can now log in using their email OTP.');
  }

  S.dischargeStep = 0;
  nav('carepath', null, false);
}

function toggleSymptom(s){
  if(S.checkinSymptoms.includes(s)) S.checkinSymptoms=S.checkinSymptoms.filter(x=>x!==s);
  else S.checkinSymptoms.push(s);
  render();
}
async function submitCheckin(){
  if(S.checkinFeel===0){ alert(t('select_feeling_first')); return; }
  if(!currentPatientId){
    alert('Your profile is not linked to a patient record.\nPlease ask your doctor to add your email to CareConnect.');
    return;
  }
  const hasRedFlag = S.checkinSymptoms.some(s=>['Chest pain','Breathlessness'].includes(s));
  const isCritical = hasRedFlag || S.checkinFeel<=2;
  const note = document.getElementById('checkinNote')?.value?.trim() || '';
  const symptoms = [...S.checkinSymptoms];
  if(S.otherSymptomText.trim()) symptoms.push(S.otherSymptomText.trim());

  const today = new Date().toISOString().split('T')[0];

  const record = {
    patient_id: currentPatientId,
    checkin_date: today,
    feeling_score: S.checkinFeel,
    pain_level: S.checkinPain,
    symptoms,
    notes: note,
    note: note,
  };

  // Delete any existing check-in for today, then insert fresh (avoids needing a unique constraint)
  await sb.from('daily_checkins').delete()
    .eq('patient_id', currentPatientId)
    .eq('checkin_date', today)
    .catch(() => {});
  const { error } = await safeInsert('daily_checkins', record);

  if(error){
    console.error('Check-in save error:', error);
    alert('Unable to save check-in: ' + error.message + '\nPlease try again.');
    return;
  }

  if(isCritical){
    await sb.from('patients').update({status:'red'}).eq('patient_id',currentPatientId).catch(()=>{});
  }

  // Refresh local checkin data so doctor dashboard is up to date
  const { data: fresh } = await sb.from('daily_checkins').select('*')
    .eq('patient_id', currentPatientId)
    .order('checkin_date',{ascending:false}).limit(7);
  if(fresh) currentCheckins = fresh;
  if(PATIENT_DATA) PATIENT_DATA.recentCheckins = currentCheckins.map(c=>({
    date:c.checkin_date,
    feeling:c.feeling_score||c.feeling||3,
    pain:c.pain_level||c.pain||3,
    symptoms:c.symptoms||[],
    note:c.notes||c.note||c.patient_notes||c.message||c.description||'',
    flag:(((c.feeling_score||c.feeling)||3)<=2||(c.symptoms||[]).some(s=>['Chest pain','Breathlessness'].includes(s)))||false
  }));

  const alertMsg = isCritical
    ? '\n\n⚠️ Your doctor and family have been alerted. Please contact your doctor.'
    : S.checkinFeel<3
      ? '\n\n📬 Check-in sent to your family and doctor for review.'
      : '\n\n✅ Check-in sent to your family and doctor. Keep it up!';
  alert(`Check-in submitted! Thank you. 🙏${alertMsg}`);
  S.checkinFeel=0; S.checkinPain=3; S.checkinSymptoms=[]; S.otherSymptomText=''; S.checkinAppetite='';
  nav('modules');
}

function renderMessage(m){

    return `<div class="msg-row">

  if(m.type==='bot'){
    return `<div class="msg-row">

      <div class="msg-bubble bot" style="white-space:pre-line">${m.text}</div>
    </div>`;
  }
  if(m.type==='user'){
    return `<div class="msg-row user">
      <div class="msg-avatar user" style="background:var(--blue-100);color:var(--blue);font-weight:700;font-size:11px;font-family:'Outfit',sans-serif">${S.role==='family'?'VK':S.role==='doctor'?'DR':S.role==='nurse'?'NU':'RK'}</div>

    return `<div style="max-width:95%;margin:0 auto">
      <div class="triage-result ${r.cls}">
        <div class="triage-result-icon">${r.icon}</div>
        <div class="triage-result-title ${r.cls}">${r.title}</div>
        <div class="triage-result-body">${r.body}</div>

          r.cls==='self-care'?'#166534':r.cls==='phc'?'#1E40AF':r.cls==='telemedicine'?'#5B21B6':'#991B1B'

function sendTriage(){
  const inp=document.getElementById('chatInput');
  const text=inp?.value?.trim();
  if(!text||S.triageState==='done') return;
  inp.value='';
  S.cgMessages.push({type:'user',text});
  render();
  scrollChat();
  triageRespond(text);
}
function resetTriage(){
  S.cgMessages=[]; S.triageState='idle'; S.triageFlow=null; S.triageStep=0;
  initTriage(); render();
}

                ${['morning','afternoon','night'].map(slot=>{
                  if(!medTimes.includes(slot)) return '<td><div class="dose-dot na">—</div></td>';
                  const s = di===6?(S.medDoseState[med?.id+':'+slot]||((med?.logs||{})[slot])||'pending'):weekData[di];
                  return `<td>${doseDot(s==='confirmed'?'confirmed':s==='missed'?'missed':di<6?'confirmed':'pending')}</td>`;
                }).join('')}
              </tr>`;
            }).join('')}
          </table>
        </div>
        <div style="display:flex;gap:14px;margin-top:14px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:5px;font-size:11px"><div class="dose-dot confirmed" style="width:16px;height:16px;font-size:9px">${I.check.replace('stroke="currentColor"','stroke="var(--success)"')}</div>Taken</div>
          <div style="display:flex;align-items:center;gap:5px;font-size:11px"><div class="dose-dot missed" style="width:16px;height:16px;font-size:9px">${I.x.replace('stroke="currentColor"','stroke="var(--danger)"')}</div>Missed</div>
          <div style="display:flex;align-items:center;gap:5px;font-size:11px"><div class="dose-dot pending" style="width:16px;height:16px"></div>Pending</div>
        </div>
      </div>
      <div style="padding:16px 16px 24px">
        <button class="btn btn-primary" onclick="closeMedHistory()">← Back to Medicines</button>
      </div>
    </div>`;
  }
  const meds = p.medications||[];
  const activeSlots = timeKeys.filter(k=>meds.some(m=>(m.logs||{})[k]&&(m.logs||{})[k]!=='na'));
  const allSlots = activeSlots.length ? activeSlots : ['morning','night'];
  const todayStr = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
  const totalMeds = meds.reduce((a,m)=>a+(m.times||[]).length,0);
  const takenCount = meds.reduce((a,m)=>a+Object.values(m.logs||{}).filter(v=>v==='confirmed').length,0) +
    Object.entries(S.medDoseState).filter(([,v])=>v==='confirmed').length;
  const missedCount = Object.entries(S.medDoseState).filter(([,v])=>v==='missed').length +
    meds.reduce((a,m)=>a+Object.values(m.logs||{}).filter(v=>v==='missed').length,0);

  return `<div class="screen" style="min-height:100vh;background:var(--bg)">
    <div class="topbar" style="background:#fff">
      <button class="topbar-back" onclick="nav('modules')">${I.back}</button>
      <div class="topbar-title">My Medicines</div>
      <div style="font-size:12px;color:var(--text3);font-weight:600">${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>
    </div>
    <!-- Daily summary -->
    <div style="background:linear-gradient(135deg,#0B7A63,#085A49);padding:14px 16px;color:#fff">
      <div style="font-size:15px;font-weight:700">नमस्ते, ${p.name.split(' ')[0]} 🙏</div>
      <div style="font-size:12px;opacity:.8;margin-top:2px">${todayStr}</div>
      <div style="display:flex;gap:10px;margin-top:10px">
        <div style="flex:1;background:rgba(255,255,255,.15);border-radius:10px;padding:8px;text-align:center">
          <div style="font-size:20px;font-weight:800">${takenCount}</div>
          <div style="font-size:10px;opacity:.8">Taken</div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,.15);border-radius:10px;padding:8px;text-align:center">
          <div style="font-size:20px;font-weight:800">${missedCount}</div>
          <div style="font-size:10px;opacity:.8">Missed</div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,.15);border-radius:10px;padding:8px;text-align:center">
          <div style="font-size:20px;font-weight:800">${Math.max(0,totalMeds-takenCount-missedCount)}</div>
          <div style="font-size:10px;opacity:.8">Pending</div>
        </div>
      </div>
    </div>
    ${missedCount>0?`<div class="alert-banner red" style="margin:10px 16px 0">
      ${I.alert.replace('stroke="currentColor"','stroke="var(--danger)"')}
      <div><strong>${missedCount} dose${missedCount>1?'s':''} missed.</strong> Your doctor and family have been notified.</div>
    </div>`:''}
    <!-- Per-slot sections -->
    ${allSlots.map(slot=>{
      const idx = timeKeys.indexOf(slot);
      const slotMeds = meds.filter(m=>(m.logs||{})[slot]&&(m.logs||{})[slot]!=='na');
      if(!slotMeds.length) return '';
      return `<div style="padding:14px 16px 4px">
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;font-family:'Outfit',sans-serif">${timeEmoji[idx]} ${timeSlots[idx]}</div>
        ${slotMeds.map((m,mi)=>{
          const key = m.id+':'+slot;
          const ds = S.medDoseState[key]||(m.logs||{})[slot]||'pending';
          const noteKey = key+':note';
          const savedNote = S.medNotes[noteKey]||'';
          const bgColors=['#E8F5F2','#EFF6FF','#EDE9FE','#FEE2E2'];
          return `<div class="today-pill" style="margin-bottom:10px">
            <div class="pill-header" style="cursor:pointer" onclick="showMedHistory(${mi})">
              <div class="pill-icon" style="background:${bgColors[mi%4]}"><span style="font-size:20px">💊</span></div>
              <div style="flex:1">
                <div style="font-size:15px;font-weight:700;color:var(--text)">${m.name}</div>
                <div style="font-size:12px;color:var(--text2)">${m.generic||m.name} · Tap for history</div>
              </div>
              <span class="badge ${ds==='confirmed'?'green':ds==='missed'?'red':'amber'}" style="flex-shrink:0">
                ${ds==='confirmed'?'✓ Taken':ds==='missed'?'✗ Missed':'● Pending'}
              </span>
            </div>
            <div class="pill-body" style="padding-top:0">
              ${ds==='pending'?`
                <button class="confirm-btn take" onclick="confirmDose('${m.id}','${slot}')">
                  ${I.check.replace('stroke="currentColor"','stroke="var(--success)"')} Mark as Taken
                </button>
                <button class="confirm-btn missed" style="margin-top:6px;background:var(--danger-l);color:var(--danger);border:1.5px solid #FCA5A5" onclick="markMissed('${m.id}','${slot}')">
                  ${I.x.replace('stroke="currentColor"','stroke="var(--danger)"')} Could Not Take It
                </button>`:''}
              ${ds==='confirmed'?`
                <div style="display:flex;align-items:center;gap:8px;padding:10px;background:var(--success-l);border-radius:var(--r-sm);color:#166534;font-size:13px;font-weight:600">
                  ${I.check.replace('stroke="currentColor"','stroke="#166534"')} Marked as taken ✅ — Visible to doctor &amp; family
                </div>
                <textarea class="form-input" style="margin-top:8px;font-size:13px;resize:none" rows="2"
                  placeholder="Add a note (e.g. taken with food, felt dizzy after)..."
                  oninput="S.medNotes['${noteKey}']=this.value">${savedNote}</textarea>
                <button class="btn btn-outline" style="width:100%;margin-top:6px;font-size:12px;padding:8px" onclick="editMedicineStatus('${m.id}','${slot}')">↩ Change Status</button>`:''}
              ${ds==='missed'?`
                <div style="display:flex;align-items:center;gap:8px;padding:10px;background:var(--danger-l);border-radius:var(--r-sm);color:var(--danger);font-size:13px;font-weight:600">
                  ${I.alert.replace('stroke="currentColor"','stroke="var(--danger)"')} Marked as missed — Doctor &amp; family notified
                </div>
                <textarea class="form-input" style="margin-top:8px;font-size:13px;resize:none" rows="2"
                  placeholder="Tell us why (e.g. forgot, felt sick, no supply)..."
                  oninput="S.medNotes['${noteKey}']=this.value">${savedNote}</textarea>
                <button class="btn btn-outline" style="width:100%;margin-top:6px;font-size:12px;padding:8px" onclick="editMedicineStatus('${m.id}','${slot}')">↩ Change Status</button>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
    <!-- Reminders -->
    <div style="padding:0 16px 24px;margin-top:8px">
      ${S.reminderTimes&&S.reminderTimes.length>0?`
        <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">Reminders (${S.reminderTimes.length})</div>
        ${S.reminderTimes.map((time,idx)=>`
          <div class="card" style="background:var(--primary-l);border-color:var(--primary-100);margin-bottom:8px;padding:12px 16px">
            <div style="display:flex;align-items:center;gap:10px">
              ${I.bell.replace('stroke="currentColor"','stroke="var(--primary)"')}
              <div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--primary)">${time}</div><div style="font-size:11px;color:var(--text2)">App notification</div></div>
              <button class="btn btn-sm" style="background:transparent;color:var(--primary);border:1px solid var(--primary);padding:6px 10px" onclick="editReminders()">Edit</button>
            </div>
          </div>`).join('')}`:`
        <div class="card" style="padding:18px;text-align:center">
          <div style="font-size:24px;margin-bottom:8px">🔔</div>
          <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px">No Reminders Set</div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:12px">Get notified at the right time to take your medicines</div>
          <button class="btn btn-outline btn-sm" style="width:100%" onclick="editReminders()">${I.plus.replace('stroke="currentColor"','stroke="var(--primary)"')} Set Reminder</button>
        </div>`}
      <button class="btn btn-ghost" style="margin-top:12px" onclick="callDoctor()">
        ${I.phone.replace('stroke="currentColor"','stroke="var(--text2)"')} Call My Doctor
      </button>
    </div>
  </div>`;
}

async function saveMedLog(id, slot, status){
  if(!currentPatientId) return;
  const today = new Date().toISOString().split('T')[0];

  // Delete any existing log for this patient/medication/date/slot
  await sb.from('medication_logs')
    .delete()
    .eq('patient_id', currentPatientId)
    .eq('medication_id', id)
    .eq('log_date', today)
    .eq('scheduled_time', slot)
    .catch(()=>{});

  // Insert with self-healing: unknown columns are auto-dropped on first failure and retried
  await safeInsert('medication_logs', {
    patient_id: currentPatientId,
    medication_id: id,
    log_date: today,
    scheduled_time: slot,
    dose_time: slot,
    status,
    taken_at: new Date().toISOString(),
  });
}

async function confirmDose(id, slot){
  S.medDoseState[`${id}:${slot}`]='confirmed';
  render();
  await saveMedLog(id, slot, 'confirmed');
}

async function markMissed(id, slot){
  S.medDoseState[`${id}:${slot}`]='missed';
  render();
  await saveMedLog(id, slot, 'missed');
}

function editMedicineStatus(id, slot){
  delete S.medDoseState[`${id}:${slot}`];
  render();
}

// ═══════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════
async function render(){
  const app=document.getElementById('app');
  await ensureUserContext();
  let html='';
  switch(S.screen){

    case 'login': html=renderLogin(); break;
    case 'otp': html=renderOTP(); break;
    case 'roleSelect': html=renderRoleSelect(); break;
    case 'noProfile': html=renderNoProfile(); break;
    case 'modules': html=renderModules(); break;
    case 'carepath': html=renderCarePath(); break;
    case 'caremeds': html=renderCareMeds(); break;
    case 'careguide': initTriage(); html=renderCareGuide(); break;
    case 'profile': html=renderProfileEditor(); break;
    default: html=renderLogin();
  }
  app.innerHTML = await html;
  // re-attach OTP inputs after render
  if(S.screen==='otp'){
    [0,1,2,3].forEach(i=>{
      const el=document.getElementById(`otp${i}`);
      if(el){ el.value=S.otp[i]; }
    });
  }
  // scroll chat to bottom
  if(S.screen==='careguide'){
    setTimeout(()=>{
      const ca=document.getElementById('chatArea');
      if(ca) ca.scrollTop=ca.scrollHeight;
    },50);
  }
}

async function handleLogout() {
  await sb.auth.signOut();
  currentUser = null;
  currentPatientId = null;
  currentPatientData = null;
  currentMedications = [];
  currentMedicationLogs = [];
  currentCheckins = [];
  availableRoles = [];
  PATIENT_DATA = null;
  PATIENT_LIST = null;
  PRACTITIONER_DATA = null;
  FAMILY_DATA = null;
  S.userType = null;
  S.userTypeHint = null;
  S.role = null;
  S.email = '';
  S.navHistory = [];
  S.showAddPatientModal = false;
  S.noProfileNudge = false;
  S.cgMessages = [];
  S.triageState = 'idle';
  S.medDoseState = {};
  S.reminderTimes = [];
  S.checkinFeel = 0;
  S.checkinPain = 3;
  S.checkinSymptoms = [];
  nav('login', null, false);
}

async function init() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
      await detectRolesAndRoute(session.user);
    } else {
      render();
    }
  } catch (e) {
    console.error('Init error:', e);
    render();
  }
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session?.user) {
    await detectRolesAndRoute(session.user);
  } else if (event === 'SIGNED_OUT') {
    handleLogout();
  }
});

init();
document.getElementById('app').addEventListener('click',e=>{
  // global click delegation for future use
});

// Keyboard shortcut — escape returns to modules (dev helper)
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&S.screen!=='login'&&S.screen!=='otp'&&S.screen!=='role'){
    nav('modules');
  }
});
</script>
